<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | تطبيق المراسلة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #00d4aa;
            --secondary: #00897b;
            --accent: #ffd700;
            --dark: #1a1a2e;
            --darker: #16213e;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* جسيمات متحركة في الخلفية */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            animation: containerFloat 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(2deg); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(0, 212, 170, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(0, 212, 170, 0.8)); }
        }

        .logo {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 20px 40px rgba(0, 212, 170, 0.3);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 170, 0.5);
            animation: textGlow 3s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 212, 170, 0.5); }
            50% { text-shadow: 0 0 40px rgba(0, 212, 170, 0.8), 0 0 60px rgba(0, 212, 170, 0.4); }
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.2);
            transform: scale(1.02);
        }

        .input-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            transition: left 0.5s;
        }

        .input-wrapper:focus-within::before {
            left: 100%;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within .input-icon {
            opacity: 1;
            color: var(--primary);
            transform: translateY(-50%) scale(1.2);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.3);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 212, 170, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        .links a:hover {
            color: var(--primary);
        }

        .links a:hover::after {
            width: 100%;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .feature {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            animation: featureFloat 3s ease-in-out infinite;
        }

        .feature:nth-child(2) { animation-delay: 0.5s; }
        .feature:nth-child(3) { animation-delay: 1s; }

        @keyframes featureFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 5px;
            display: block;
        }

        /* تأثيرات إضافية */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 10s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -150px;
            right: -150px;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: var(--accent);
            bottom: -100px;
            left: -100px;
            animation-delay: 5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <!-- جسيمات الخلفية -->
    <div class="particles" id="particles"></div>
    
    <!-- دوائر مضيئة -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo-wrapper">
                <div class="logo">💬</div>
            </div>
            <h1>أهلاً بعودتك</h1>
            <p class="subtitle">سجل دخولك للانضمام إلى المحادثات</p>
        </div>

        <div class="error-message" id="errorMsg">
            ⚠️ بيانات الدخول غير صحيحة
        </div>

        <form id="loginForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">📱</span>
                    <input type="text" id="loginUser" placeholder="رقم الهاتف أو اسم المستخدم" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPass" placeholder="كلمة المرور" required>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                دخول إلى العالم
            </button>
        </form>

        <div class="links">
            <a href="register.html">إنشاء حساب جديد</a>
            <a href="#" onclick="forgotPassword()">نسيت كلمة المرور؟</a>
        </div>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">🔐</span>
                <span>آمن 100%</span>
            </div>
            <div class="feature">
                <span class="feature-icon">⚡</span>
                <span>سريع جداً</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🌍</span>
                <span>مجاني للأبد</span>
            </div>
        </div>
    </div>

    <script>
        // إنشاء جسيمات عشوائية
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particle.style.width = particle.style.height = (Math.random() * 20 + 5) + 'px';
                container.appendChild(particle);
            }
        }
        createParticles();

        // التحقق من الجلسة
        if(localStorage.getItem('currentUser')) {
            window.location.href = 'chat.html';
        }

        // معالجة تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.classList.add('loading');
            btn.textContent = 'جاري الدخول...';
            
            setTimeout(() => {
                const user = document.getElementById('loginUser').value;
                const pass = document.getElementById('loginPass').value;
                
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const found = users.find(u => 
                    (u.phone === user || u.username === user || u.email === user) && 
                    u.password === pass
                );
                
                if(found) {
                    // تحديث آخر دخول
                    found.lastLogin = new Date().toISOString();
                    found.isOnline = true;
                    
                    const allUsers = users.map(u => u.id === found.id ? found : u);
                    localStorage.setItem('users', JSON.stringify(allUsers));
                    localStorage.setItem('currentUser', JSON.stringify(found));
                    
                    // تأثير الانتقال
                    document.body.style.animation = 'fadeOut 0.5s forwards';
                    setTimeout(() => {
                        window.location.href = 'chat.html';
                    }, 500);
                } else {
                    btn.classList.remove('loading');
                    btn.textContent = 'دخول إلى العالم';
                    errorMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 3000);
                }
            }, 1500);
        });

        function forgotPassword() {
            alert('🔧 ميزة استعادة كلمة المرور قيد التطوير');
        }

        // تأثير fadeOut
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                to { opacity: 0; transform: scale(0.9); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشتي | تطبيق المراسلة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #00d4aa;
            --primary-dark: #00897b;
            --secondary: #667eea;
            --accent: #ffd700;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-light: #252540;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --success: #00d4aa;
            --warning: #ffb700;
            --danger: #ff4757;
            --info: #3498db;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* تأثيرات الخلفية السينمائية */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: orbFloat 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -200px;
            right: -200px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -150px;
            left: -150px;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.2); }
        }

        /* الشريط الجانبي */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.2), rgba(102, 126, 234, 0.2));
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 10px;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .user-profile:hover {
            background: rgba(255,255,255,0.05);
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            position: relative;
            animation: avatarPulse 2s infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(0, 212, 170, 0); }
        }

        .user-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: var(--success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: statusBlink 2s infinite;
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .action-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 170, 0.3);
        }

        .search-container {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .tabs {
            display: flex;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            position: relative;
            color: var(--text-secondary);
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: var(--primary);
            border-radius: 3px 3px 0 0;
            animation: tabSlide 0.3s ease;
        }

        @keyframes tabSlide {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        .tab-badge {
            background: var(--danger);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-right: 5px;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 5px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .contact-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(0, 212, 170, 0.1), transparent);
            transition: width 0.3s;
        }

        .contact-item:hover::before, .contact-item.active::before {
            width: 100%;
        }

        .contact-item:hover, .contact-item.active {
            background: rgba(255,255,255,0.05);
            transform: translateX(-5px);
        }

        .contact-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin-left: 15px;
            position: relative;
            object-fit: cover;
        }

        .contact-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-card);
        }

        .contact-avatar.offline::after {
            background: var(--text-secondary);
        }

        .contact-info {
            flex: 1;
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .contact-name {
            font-weight: 600;
            font-size: 15px;
        }

        .contact-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .contact-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .contact-preview.unread {
            color: var(--text-primary);
            font-weight: 600;
        }

        .unread-badge {
            background: var(--primary);
            color: var(--bg-dark);
            font-size: 12px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            min-width: 22px;
            text-align: center;
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* منطقة الدردشة */
        .chat-area {
            margin-right: 380px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            position: relative;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .chat-title h3 {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .chat-status {
            font-size: 13px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-indicator {
            display: none;
            font-style: italic;
        }

        .typing-indicator.active {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-actions {
            display: flex;
            gap: 10px;
        }

        .chat-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-action-btn:hover {
            background: var(--primary);
            transform: scale(1.1) rotate(5deg);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
            animation: messageSlide 0.3s ease;
            line-height: 1.6;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.sent {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 5px 20px rgba(0, 212, 170, 0.3);
        }

        .message.received {
            background: var(--bg-card);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .message.reply {
            background: rgba(0, 212, 170, 0.1);
            border-right: 3px solid var(--primary);
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .message-content {
            margin-bottom: 5px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            opacity: 0.8;
            justify-content: flex-end;
        }

        .message-actions {
            position: absolute;
            top: -30px;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 5px 10px;
            display: none;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .message:hover .message-actions {
            display: flex;
        }

        .message-action {
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .message-action:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.2);
        }

        .input-area {
            padding: 20px 30px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.2);
        }

        .input-actions {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .input-action {
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
            font-size: 20px;
        }

        .input-action:hover {
            color: var(--primary);
            transform: scale(1.2);
        }

        .send-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 20px rgba(0, 212, 170, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.6);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* الشاشة الرئيسية */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-logo {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin-bottom: 30px;
            animation: welcomeFloat 6s ease-in-out infinite;
            box-shadow: 0 30px 60px rgba(0, 212, 170, 0.3);
        }

        @keyframes welcomeFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .welcome-screen h2 {
            font-size: 32px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 500px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .feature-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 212, 170, 0.2);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        /* النوافذ المنبثقة */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.8) translateY(50px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

            display: flex;
            justify-conte

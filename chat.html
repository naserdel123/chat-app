<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشتي | تطبيق المراسلة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #00d4aa;
            --primary-dark: #00b894;
            --secondary: #6c5ce7;
            --accent: #fd79a8;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-light: #1e1e2e;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #d63031;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -200px;
            right: -200px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -150px;
            left: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* التطبيق */
        .app {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            width: 400px;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 25px;
            background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(108,92,231,0.15));
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 15px;
            border-radius: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .user-card:hover::before {
            left: 100%;
        }

        .user-card:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(-5px);
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0,212,170,0.3);
            transition: all 0.3s;
        }

        .user-card:hover .user-avatar {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0,212,170,0.5);
        }

        .user-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--primary);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--primary);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .quick-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn:active::after {
            width: 300px;
            height: 300px;
        }

        .action-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,212,170,0.3);
        }

        .search-box {
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0,212,170,0.2);
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .contacts-list::-webkit-scrollbar {
            width: 6px;
        }

        .contacts-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 18px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid transparent;
        }

        .contact-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--primary);
            border-radius: 20px 0 0 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .contact-item:hover, .contact-item.active {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
            transform: translateX(-5px);
        }

        .contact-item.active::before {
            opacity: 1;
        }

        .contact-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin-left: 15px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .contact-item:hover .contact-avatar {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-badge {
            font-size: 11px;
            background: var(--secondary);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .contact-preview {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .contact-meta {
            text-align: center;
        }

        .contact-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .unread-badge {
            background: var(--primary);
            color: var(--bg-dark);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 15px;
            min-width: 24px;
            display: inline-block;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.8s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .welcome-logo {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin-bottom: 40px;
            animation: floatLogo 6s ease-in-out infinite;
            box-shadow: 0 30px 60px rgba(0,212,170,0.3);
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .welcome-screen h2 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            background-size: 200% auto;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .welcome-screen p {
            color: var(--text-muted);
            font-size: 18px;
            max-width: 400px;
        }

        .chat-header {
            padding: 25px 30px;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 20px;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .chat-header img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
        }

        .chat-header-info h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .chat-header-info p {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 65%;
            padding: 18px 24px;
            border-radius: 25px;
            position: relative;
            animation: messagePop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            line-height: 1.6;
        }

        @keyframes messagePop {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .message.sent {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            align-self: flex-end;
            border-bottom-right-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,212,170,0.2);
        }

        .message.received {
            background: var(--bg-light);
            align-self: flex-start;
            border-bottom-left-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message-sender {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .message-text {
            font-size: 15px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.8;
            justify-content: flex-end;
        }

        .message-actions {
            position: absolute;
            top: -35px;
            right: 0;
            background: var(--bg-light);
            border-radius: 20px;
            padding: 8px 15px;
            display: none;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .message:hover .message-actions {
            display: flex;
            animation: fadeIn 0.2s;
        }

        .message-action {
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .message-action:hover {
            transform: scale(1.2);
        }

        .input-area {
            padding: 25px 30px;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 20px;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-area input {
            width: 100%;
            padding: 18px 25px;
            background: var(--bg-light);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-area input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0,212,170,0.2);
        }

        .input-actions {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 15px;
        }

        .input-icon {
            cursor: pointer;
            font-size: 22px;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .input-icon:hover {
            color: var(--primary);
            transform: scale(1.2);
        }

        .send-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,212,170,0.3);
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 15px 40px rgba(0,212,170,0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 35px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.8) translateY(50px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .modal-overlay.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .close-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: var(--danger);
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشتي | المحادثات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #00d4aa;
            --secondary: #667eea;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-light: #252540;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            background: var(--bg-card);
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(0,212,170,0.2), rgba(102,126,234,0.2));
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .user-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
        }

        .user-info h3 {
            font-size: 17px;
        }

        .user-status {
            font-size: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .action-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .search-box {
            padding: 15px;
            background: rgba(0,0,0,0.2);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: white;
            outline: none;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: var(--primary);
            border-radius: 3px 3px 0 0;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .contact-item:hover, .contact-item.active {
            background: rgba(255,255,255,0.05);
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-left: 15px;
            object-fit: cover;
            position: relative;
        }

        .contact-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            border: 2px solid var(--bg-card);
        }

        .contact-avatar.offline::after {
            background: #666;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-icon {
            font-size: 12px;
            color: var(--primary);
        }

        .contact-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-time {
            font-size: 12px;
            color: #666;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 100px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .welcome-screen h2 {
            font-size: 28px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen p {
            color: var(--text-secondary);
        }

        .chat-header {
            padding: 20px;
            background: var(--bg-card);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info h3 {
            font-size: 18px;
        }

        .chat-header-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            background: linear-gradient(135deg, var(--primary), #00897b);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            background: var(--bg-card);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-sender {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 5px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: left;
        }

        .input-area {
            padding: 20px;
            background: var(--bg-card);
            display: flex;
            gap: 15px;
        }

        .input-area input {
            flex: 1;
            padding: 15px 20px;
            background: var(--bg-light);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 25px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 22px;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #f44336;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 15px;
            background: var(--bg-light);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-light);
            border-radius: 15px;
            margin-top: 10px;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .result-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .result-item img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-left: 15px;
            object-fit: cover;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-weight: 600;
        }

        .result-phone {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .add-btn {
            padding: 8px 20px;
            background: var(--primary);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .member-selection {
            max-height: 250px;
            overflow-y: auto;
            background: var(--bg-light);
            border-radius: 15px;
            padding: 10px;
            margin: 15px 0;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .member-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .member-item.selected {
            background: rgba(0, 212, 170, 0.2);
        }

        .member-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: 12px;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #666;
            border-radius: 6px;
            margin-right: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s;
        }

        .member-item.selected .checkbox {
            background: var(--primary);
            border-color: var(--primary);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile" onclick="goToProfile()">
                    <img src="" alt="أنا" class="user-avatar" id="currentAvatar">
                    <div class="user-info">
                        <h3 id="currentName">أنا</h3>
                        <div class="user-status">
                            <span class="status-dot"></span>
                            <span>متصل</span>
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="action-btn" onclick="openAddContactModal()">
                        ➕ إضافة
                    </button>
                    <button class="action-btn" onclick="openCreateGroupModal()">
                        👥 مجموعة
                    </button>
                </div>
            </div>

            <div class="search-box">
                <input type="text" placeholder="🔍 البحث في المحادثات..." id="searchInput" oninput="searchContacts()">
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('all')">الكل</div>
                <div class="tab" onclick="switchTab('groups')">المجموعات</div>
                <div class="tab" onclick="switchTab('contacts')">جهات الاتصال</div>
            </div>

            <div class="contacts-list" id="contactsList">
                <!-- Contacts loaded here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">💬</div>
                <h2>مرحباً بك في دردشتي</h2>
                <p>اختر محادثة للبدء أو أضف أصدقاء جدد</p>
            </div>

            <div class="chat-header hidden" id="chatHeader">
                <img src="" id="chatAvatar">
                <div class="chat-header-info">
                    <h3 id="chatName"></h3>
                    <p id="chatStatus">متصل الآن</p>
                </div>
            </div>

            <div class="messages-container hidden" id="messagesContainer"></div>

            <div class="input-area hidden" id="inputArea">
                <input type="text" id="messageInput" placeholder="اكتب رسالتك..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Modal إضافة جهة اتصال -->
    <div class="modal-overlay" id="addContactModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">➕ إضافة جهة اتصال</h3>
                <button class="close-btn" onclick="closeAddContactModal()">×</button>
            </div>
            
            <div class="form-group">
                <label>ابحث برقم الهاتف أو اسم المستخدم</label>
                <input type="text" id="searchContact" placeholder="مثال: 0501234567 أو @username" oninput="searchUsers()">
            </div>

            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <!-- Modal إنشاء مجموعة -->
    <div class="modal-overlay" id="createGroupModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">👥 إنشاء مجموعة جديدة</h3>
                <button class="close-btn" onclick="closeCreateGroupModal()">×</button>
            </div>
            
            <div class="form-group">
                <label>اسم المجموعة *</label>
                <input type="text" id="groupName" placeholder="مثال: فريق العمل">
            </div>

            <div class="form-group">
                <label>الوصف</label>
                <textarea id="groupDesc" rows="2" placeholder="وصف قصير للمجموعة..."></textarea>
            </div>

            <div class="form-group">
                <label>اختر الأعضاء *</label>
                <div class="member-selection" id="memberSelection">
                    <!-- الأعضاء المتاحين -->
                </div>
            </div>

            <button class="action-btn" onclick="createGroup()" style="width: 100%; background: var(--primary);">
                ✨ إنشاء المجموعة
            </button>
        </div>
    </div>

        // التحقق من تسجيل الدخول
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentUser) {
            window.location.href = 'index.html';
        }

        let currentChat = null;
        let messages = JSON.parse(localStorage.getItem('messages') || '{}');
        let groups = JSON.parse(localStorage.getItem('groups') || '[]');
        let selectedMembers = [];
        let currentTab = 'all';

        function init() {
            document.getElementById('currentAvatar').src = currentUser.avatar;
            document.getElementById('currentName').textContent = currentUser.fullName;
            
            updateUserStatus(true);
            loadContacts();
            
            // محاكاة رسائل
            setInterval(simulateIncomingMessage, 30000);
        }

        function updateUserStatus(online) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.id === currentUser.id);
            if(user) {
                user.isOnline = online;
                user.lastActive = new Date().toISOString();
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(user));
                currentUser = user;
            }
        }

            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadContacts();

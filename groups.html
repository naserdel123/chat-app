<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجموعات | دردشتي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #00d4aa;
            --secondary: #667eea;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-light: #252540;
            --danger: #ff4757;
            --warning: #ffb700;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 36px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .create-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.3);
        }

        .create-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 170, 0.4);
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .group-card {
            background: var(--bg-card);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .group-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: rgba(0, 212, 170, 0.3);
        }

        .group-header {
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            position: relative;
            overflow: hidden;
        }

        .group-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            position: absolute;
            bottom: -40px;
            right: 30px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .group-body {
            padding: 50px 25px 25px;
        }

        .group-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .group-desc {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .group-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .group-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #aaa;
        }

        .group-actions {
            display: flex;
            gap: 10px;
        }

        .group-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-enter {
            background: var(--primary);
            color: white;
        }

        .btn-manage {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-leave {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .group-btn:hover {
            transform: scale(1.05);
        }

        .admin-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, var(--warning), var(--danger));
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #888;
        }

        .empty-icon {
            font-size: 100px;
            margin-bottom: 30px;
            opacity: 0.5;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.8);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 24px;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: var(--danger);
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
        }

        .members-list {
            max-height: 300px;
            overflow-y: auto;
            background: var(--bg-light);
            border-radius: 15px;
            padding: 15px;
        }

        .member-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .member-row:last-child {
            border-bottom: none;
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .member-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .member-name {
            font-weight: 600;
        }

        .member-role {
            font-size: 12px;
            color: var(--primary);
        }

        .member-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .icon-btn.promote {
            background: rgba(0, 212, 170, 0.2);
            color: var(--primary);
        }

        .icon-btn.remove {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .icon-btn:hover {
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .groups-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <a href="chat.html" class="back-link">← العودة للدردشات</a>
                <h1>👥 مجموعاتي</h1>
            </div>
            <button class="create-btn" onclick="openCreateModal()">
                <span>+</span>
                <span>مجموعة جديدة</span>
            </button>
        </div>

        <div class="groups-grid" id="groupsGrid">
            <!-- المجموعات تُضاف هنا -->
        </div>
    </div>

    <!-- Modal إنشاء مجموعة -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">✨ مجموعة جديدة</h3>
                <button class="close-btn" onclick="closeCreateModal()">×</button>
            </div>
            
            <div class="form-group">
                <label>اسم المجموعة *</label>
                <input type="text" id="newGroupName" placeholder="مثال: فريق العمل">
            </div>
            
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="newGroupDesc" rows="3" placeholder="وصف المجموعة..."></textarea>
            </div>
            
            <div class="form-group">
                <label>اختر الأعضاء *</label>
                <div class="members-list" id="contactsList">
                    <!-- جهات الاتصال -->
                </div>
            </div>
            
            <button class="create-btn" onclick="createNewGroup()" style="width: 100%; margin-top: 20px;">
                إنشاء المجموعة
            </button>
        </div>
    </div>

    <!-- Modal إدارة المجموعة -->
    <div class="modal-overlay" id="manageModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">⚙️ إدارة المجموعة</h3>
                <button class="close-btn" onclick="closeManageModal()">×</button>
            </div>
            
            <div id="manageContent">
                <!-- محتوى الإدارة -->
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if(!currentUser) window.location.href = 'index.html';

        let allUsers = JSON.parse(localStorage.getItem('users') || '[]');
        let groups = JSON.parse(localStorage.getItem('groups') || '[]');
        let selectedMembers = [];

        function loadGroups() {
            const grid = document.getElementById('groupsGrid');
            grid.innerHTML = '';

            const myGroups = groups.filter(g => 
                g.members.includes(currentUser.id) || g.admins.includes(currentUser.id)
            );

            if(myGroups.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">👥</div>
                        <h2>لا توجد مجموعات</h2>
                        <p>أنشئ مجموعتك الأولى وادعُ أصدقاءك للانضمام</p>
                    </div>
                `;
                return;
            }

            myGroups.forEach(group => {
                const isAdmin = group.admins.includes(currentUser.id);
                const card = document.createElement('div');
                card.className = 'group-card';
                
                card.innerHTML = `
                    ${isAdmin ? '<div class="admin-badge">⭐ أنت المشرف</div>' : ''}
                    <div class="group-header">
                        <img src="${group.avatar}" class="group-avatar">
                    </div>
                    <div class="group-body">
                        <h3 class="group-name">${group.name}</h3>
                        <p class="group-desc">${group.description || 'لا يوجد وصف'}</p>
                        <div class="group-stats">
                            <span class="group-stat">👥 ${group.members.length} عضو</span>
                            <span class="group-stat">💬 ${getGroupMessages(group.id)} رسالة</span>
                            <span class="group-stat">📅 ${formatDate(group.createdAt)}</span>
                        </div>
                        <div class="group-actions">
                            <button class="group-btn btn-enter" onclick="enterGroup(${group.id})">
                                الدخول للمحادثة
                            </button>
                            ${isAdmin ? 
                                `<button class="group-btn btn-manage" onclick="manageGroup(${group.id})">إدارة</button>` :
                                `<button class="group-btn btn-leave" onclick="leaveGroup(${group.id})">مغادرة</button>`
                            }
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function getGroupMessages(groupId) {
            const messages = JSON.parse(localStorage.getItem('messages') || '{}');
            const groupMessages = messages[`group_${groupId}`] || [];
            return groupMessages.length;
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('ar-SA', {year: 'numeric', month: 'short'});
        }

        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
            loadContactsForSelection();
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            selectedMembers = [];
        }

        function loadContactsForSelection() {
            const container = document.getElementById('contactsList');
            container.innerHTML = '';
            
            const contacts = allUsers.filter(u => 
                currentUser.contacts?.includes(u.id) && u.id !== currentUser.id
            );

            if(contacts.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">لا توجد جهات اتصال</p>';
                return;
            }

            contacts.forEach(user => {
                const div = document.createElement('div');
                div.className = 'member-row';
                div.style.cursor = 'pointer';
                div.onclick = () => toggleMember(user.id, div);
                
                div.innerHTML = `
                    <div class="member-info">
                        <img src="${user.avatar}" class="member-avatar">
                        <div>
                            <div class="member-name">${user.fullName}</div>
                            <div class="member-role">${user.username}</div>
                        </div>
                    </div>
                    <div class="checkbox" style="width: 24px; height: 24px; border: 2px solid #666; border-radius: 6px;"></div>
                `;
                
                container.appendChild(div);
            });
        }

        function toggleMember(userId, element) {
            const checkbox = element.querySelector('.checkbox');
            
            if(selectedMembers.includes(userId)) {
                selectedMembers = selectedMembers.filter(id => id !== userId);
                checkbox.style.background = 'transparent';
                checkbox.style.borderColor = '#666';
            } else {
                selectedMembers.push(userId);
                checkbox.style.background = 'var(--primary)';
                checkbox.style.borderColor = 'var(--primary)';
            }
        }

        function createNewGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            const desc = document.getElementById('newGroupDesc').value.trim();

            if(!name) {
                alert('يرجى إدخال اسم المجموعة');
                return;
            }

            if(selectedMembers.length === 0) {
                alert('يرجى اختيار عضو واحد على الأقل');
                return;
            }

            const newGroup = {
                id: Date.now(),
                name: name,
                description: desc,
                avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&size=150`,
                creator: currentUser.id,
                admins: [currentUser.id],
                members: [currentUser.id, ...selectedMembers],
                createdAt: new Date().toISOString(),
                settings: {
                    onlyAdminsCanPost: false,
                    approvalRequired: false
                }
            };

            groups.push(newGroup);
            localStorage.setItem('groups', JSON.stringify(groups));

            // إضافة للمستخدمين
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            [currentUser.id, ...selectedMembers].forEach(memberId => {
                const user = users.find(u => u.id === memberId);
                if(user) {
                    if(!user.groups) user.groups = [];
                    user.groups.push(newGroup.id);
                }
            });
            localStorage.setItem('users', JSON.stringify(users));

            // تحديث المستخدم الحالي
            currentUser.groups.push(newGroup.id);
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            closeCreateModal();
            loadGroups();
            alert('✅ تم إنشاء المجموعة بنجاح!');
        }

        function enterGroup(groupId) {
            const group = groups.find(g => g.id === groupId);
            window.location.href = `chat.html?group=${groupId}`;
        }

        function manageGroup(groupId) {
            const group = groups.find(g => g.id === groupId);
            document.getElementById('manageModal').classList.add('active');
            
            const content = document.getElementById('manageContent');
            content.innerHTML = `
                <div class="form-group">
                    <label>اسم المجموعة</label>
                    <input type="text" value="${group.name}" id="editGroupName">
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="editGroupDesc" rows="3">${group.description || ''}</textarea>
